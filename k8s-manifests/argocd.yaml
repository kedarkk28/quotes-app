
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quotes-app
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/kedarkk28/quotes-app  
    targetRevision: dev 
    path: k8s-manifests 

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: quotes-app

  syncPolicy:
    automated:
      prune: true 
      selfHeal: true 
    syncOptions:
      - CreateNamespace=true 