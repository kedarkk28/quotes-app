apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: quotes-app
  labels:
    app: postgres
    tier: database
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      #nodePort: 30002
  type: ClusterIP
 # type: NodePort
